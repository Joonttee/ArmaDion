  <!-- Hub -->
  <circle cx="16" cy="16" r="6" fill="#7f8c8d"/>
  <circle cx="16" cy="16" r="4" fill="#95a5a6"/>
  <!-- Bolts -->
  <circle cx="16" cy="11" r="1" fill="#bdc3c7"/>
  <circle cx="16" cy="21" r="1" fill="#bdc3c7"/>
  <circle cx="11" cy="16" r="1" fill="#bdc3c7"/>
