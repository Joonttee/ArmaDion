  <!-- Burners -->
  <circle cx="12" cy="14" r="4" fill="#1a252f"/>
  <circle cx="20" cy="14" r="4" fill="#1a252f"/>
  <circle cx="12" cy="22" r="4" fill="#1a252f"/>
