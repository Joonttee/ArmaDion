<svg width="96" height="64" xmlns="http://www.w3.org/2000/svg">
  <!-- Jeep body -->
  <rect x="8" y="20" width="80" height="28" fill="#5d6d3a"/>
  <!-- Windshield frame -->
  <rect x="24" y="12" width="48" height="12" fill="#4a5a2f"/>
  <rect x="28" y="14" width="40" height="8" fill="#3498db" opacity="0.6"/>
  <!-- Roll cage -->
  <line x1="24" y1="12" x2="24" y2="48" stroke="#4a5a2f" stroke-width="3"/>
  <line x1="72" y1="12" x2="72" y2="48" stroke="#4a5a2f" stroke-width="3"/>
  <line x1="24" y1="12" x2="72" y2="12" stroke="#4a5a2f" stroke-width="3"/>
  <!-- Wheels -->
  <ellipse cx="24" cy="52" rx="10" ry="7" fill="#2c3e50"/>
  <ellipse cx="72" cy="52" rx="10" ry="7" fill="#2c3e50"/>
  <!-- Wheel detail -->
  <ellipse cx="24" cy="52" rx="5" ry="4" fill="#34495e"/>
  <ellipse cx="72" cy="52" rx="5" ry="4" fill="#34495e"/>
</svg>
