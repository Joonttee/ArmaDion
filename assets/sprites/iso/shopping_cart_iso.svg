<svg width="32" height="32" xmlns="http://www.w3.org/2000/svg">
  <!-- Cart body -->
  <rect x="4" y="8" width="24" height="16" fill="#bdc3c7"/>
  <!-- Wire mesh -->
  <line x1="8" y1="8" x2="8" y2="24" stroke="#95a5a6" stroke-width="1"/>
  <line x1="16" y1="8" x2="16" y2="24" stroke="#95a5a6" stroke-width="1"/>
  <line x1="24" y1="8" x2="24" y2="24" stroke="#95a5a6" stroke-width="1"/>
  <line x1="4" y1="12" x2="28" y2="12" stroke="#95a5a6" stroke-width="1"/>
  <line x1="4" y1="16" x2="28" y2="16" stroke="#95a5a6" stroke-width="1"/>
  <line x1="4" y1="20" x2="28" y2="20" stroke="#95a5a6" stroke-width="1"/>
  <!-- Handle -->
  <rect x="28" y="4" width="2" height="20" fill="#7f8c8d"/>
  <!-- Wheels -->
  <circle cx="8" cy="28" r="4" fill="#2c3e50"/>
  <circle cx="24" cy="28" r="4" fill="#2c3e50"/>
</svg>
