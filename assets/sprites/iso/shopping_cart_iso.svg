<svg width="64" height="48" xmlns="http://www.w3.org/2000/svg">
  <!-- Shopping cart body -->
  <rect x="8" y="16" width="40" height="20" fill="#bdc3c7"/>
  <!-- Wire mesh pattern -->
  <line x1="12" y1="20" x2="44" y2="20" stroke="#95a5a6" stroke-width="1"/>
  <line x1="12" y1="24" x2="44" y2="24" stroke="#95a5a6" stroke-width="1"/>
  <line x1="12" y1="28" x2="44" y2="28" stroke="#95a5a6" stroke-width="1"/>
  <line x1="12" y1="32" x2="44" y2="32" stroke="#95a5a6" stroke-width="1"/>
  <line x1="16" y1="16" x2="16" y2="36" stroke="#95a5a6" stroke-width="1"/>
  <line x1="24" y1="16" x2="24" y2="36" stroke="#95a5a6" stroke-width="1"/>
  <line x1="32" y1="16" x2="32" y2="36" stroke="#95a5a6" stroke-width="1"/>
  <line x1="40" y1="16" x2="40" y2="36" stroke="#95a5a6" stroke-width="1"/>
  <!-- Handle -->
  <rect x="48" y="8" width="4" height="28" fill="#7f8c8d"/>
  <!-- Wheels -->
  <circle cx="16" cy="40" r="4" fill="#2c3e50"/>
  <circle cx="40" cy="40" r="4" fill="#2c3e50"/>
  <!-- Swivel wheels -->
  <circle cx="24" cy="40" r="2" fill="#34495e"/>
  <circle cx="36" cy="40" r="2" fill="#34495e"/>
</svg>
